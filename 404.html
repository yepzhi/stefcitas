<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>Redirecting... | yepzhi.com</title>
    <script type="text/javascript">
        // Normalize path by stripping .html and redirecting to project root
        const cleanPath = window.location.pathname.replace(/\.html$/, "");
        const pathSegments = cleanPath.split("/");
        const projectRoot = pathSegments.slice(0, 2).join("/");
        window.location.replace(window.location.origin + projectRoot + "/");
    </script>
</head>
<body>
    <p>Redirigiendo al inicio del proyecto...</p>
</body>
</html>
